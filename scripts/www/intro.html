<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>水浒序章 · 倒霉太尉闯大祸</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            width:100vw;
            height:100vh;
            background:#f8f3e6;
            font-family:"楷体","微软雅黑",serif;
            color:#2b1b0e;
            overflow:hidden;
        }
        .intro-box{
            width:100%;
            height:100%;
            position:relative;
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction: column;
        }
        .scroll-text{
            width:85%;
            max-width:500px;
            font-size:18px;
            line-height:2.2;
            text-align:center;
            white-space:normal;
            word-break:break-word;
            opacity:0;
            animation:fadeUp 8s ease forwards;
        }
        .scroll-text p {
            margin-bottom: 1.2em;
        }
        @keyframes fadeUp {
            0% { transform: translateY(80px); opacity:0; }
            100% { transform: translateY(0); opacity:1; }
        }
        .btn-next{
            position:absolute;
            bottom:50px;
            left:50%;
            transform:translateX(-50%);
            padding:12px 30px;
            background:#d4b886;
            border:none;
            border-radius:8px;
            font-size:18px;
            color:#2b1b0e;
            opacity:0;
            animation:showBtn 1s ease 8s forwards;
            cursor:pointer;
        }
        @keyframes showBtn {
            0%{opacity:0;}
            100%{opacity:1;}
        }
        .tip{
            position:absolute;
            top:20px;
            right:20px;
            font-size:14px;
            color:#777;
        }
    </style>
</head>
<body>

<div class="intro-box" id="box">
    <div class="tip">戳一下直接跳过（别告诉太尉）</div>

    <div class="scroll-text">
        <p>大宋仁宗年间，瘟疫横行，老百姓连火锅都吃不上。太尉洪信奉命去龙虎山祈福，结果路上听信“导游”忽悠，非要开一座写着“谁开谁是狗”的伏魔古殿。</p>
        <p>道长急得直跺脚：“太尉使不得！里面封印着108个暴躁老哥！”洪太尉鼻孔朝天：“我偏不信！”一脚踹开石碑。</p>
        <p>“轰——”黑烟冒出，飞出36颗天罡星、72颗地煞星，外加一只倒霉的乌鸦糊了太尉一脸。</p>
        <p>108位好汉（以后要造反的）就这么嘻嘻哈哈散落人间。从此，水浒江湖……不，是<strong>搞笑英雄传</strong>，正式开搞！</p>
    </div>

    <button class="btn-next" id="next">开搞！进游戏</button>
</div>

<script>
const box = document.getElementById('box');
const next = document.getElementById('next');

next.onclick = () => {
  location.href = 'quiz_home.html';
};

box.onclick = () => {
  location.href = 'quiz_home.html';
};
</script>

</body>
</html>
